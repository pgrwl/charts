---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pgrwl.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pgrwl.labels" . | nindent 4 }}
data:
  config.yml: |
    {{- tpl (mergeOverwrite (tpl .Values.config . | fromYaml) .Values.structuredConfig | toYaml) . | nindent 4 }}
